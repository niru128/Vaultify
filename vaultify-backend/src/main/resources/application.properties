spring.datasource.url=${SPRING_DATASOURCE_URL:${DB_URL:${DATABASE_URL:}}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${DB_USERNAME:${DATABASE_USERNAME:}}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:${DATABASE_PASSWORD:}}}

spring.datasource.driver-class-name=org.postgresql.Driver

# server.port=8082

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB
supabase.url=${SUPABASE_URL}
supabase.key=${SUPABASE_KEY}
supabase.bucket=${SUPABASE_BUCKET}
server.port=${PORT:8082}
logging.level.org.springframework=INFO

# JWT secret for token signing. Prefer setting JWT_SECRET in the environment.
jwt.secret=${JWT_SECRET}

# server.port=8082

# spring.main.allow-bean-definition-overriding=true